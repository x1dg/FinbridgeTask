name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  DOTNET_VERSION: 10.0.x

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Finbridge.slnx

      - name: Build
        run: dotnet build Finbridge.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Finbridge.slnx --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/**/*.trx'
          if-no-files-found: ignore

  docker-build:
    name: Docker Build (API + Backoffice)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Finbridge.Api/Dockerfile
          tags: finbridge-api:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backoffice image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Finbridge.Backoffice/Dockerfile
          tags: finbridge-backoffice:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
